<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#0c1528">
    <meta name="description" content="The Idea Graveyard — where ideas go to live. Drop a seed, get a brainstorm.">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>The Idea Graveyard</title>
    <link rel="stylesheet" href="/style.css">
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90' fill='%23d0d8e4'%3E%E2%96%A0%3C/text%3E%3C/svg%3E">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js" defer></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js" defer></script>
</head>
<body>
    <div class="terminal" id="terminal">

        <div class="header-bar">
            <span class="header-title">The Idea Graveyard</span>
            <span class="header-sub">v1.0</span>
        </div>

        <div class="terminal-body">

            <!-- INPUT VIEW -->
            <section id="inputView" class="view view-active">

                <div class="input-wrap">
                    <textarea id="seedInput"
                              placeholder="Describe your idea, paste a link, or just drop a fragment..."
                              rows="5"
                              autocomplete="off"
                              autocapitalize="sentences"
                              spellcheck="true"></textarea>
                    <div class="input-toolbar">
                        <label class="toolbar-btn" for="attachInput">
                            <svg viewBox="0 0 24 24"><path d="M16.5 6v11.5a4 4 0 0 1-8 0V5a2.5 2.5 0 0 1 5 0v10.5a1 1 0 0 1-2 0V6h-1.5v9.5a2.5 2.5 0 0 0 5 0V5a4 4 0 0 0-8 0v12.5a5.5 5.5 0 0 0 11 0V6z"/></svg>
                            Attach Files
                        </label>
                        <input type="file" id="attachInput" multiple
                               accept="image/*,.pdf,audio/*,.txt,.md,.csv,.json"
                               hidden>
                        <button class="toolbar-btn" id="voiceBtn" type="button">
                            <svg id="voiceIcon" viewBox="0 0 24 24"><path d="M12 14a3 3 0 0 0 3-3V5a3 3 0 0 0-6 0v6a3 3 0 0 0 3 3zm5-3a5 5 0 0 1-10 0H5a7 7 0 0 0 6 6.93V21h2v-3.07A7 7 0 0 0 19 11z"/></svg>
                            <span id="voiceLabel">Record</span>
                        </button>
                        <div class="mode-toggle">
                            <button class="mode-btn active" id="modeQuick" type="button">Quick</button>
                            <button class="mode-btn" id="modeDeep" type="button">Deep</button>
                        </div>
                    </div>
                </div>

                <ul id="attachList" class="attach-list" aria-live="polite"></ul>

                <button class="run-btn" id="generateBtn" type="button">
                    Run Brainstorm
                </button>

                <div id="errorBox" class="error-box hidden"></div>
            </section>

            <!-- LOADING VIEW -->
            <section id="loadingView" class="view">
                <div class="loading-block">
                    <div class="loading-header">
                        Processing &middot; <span class="loading-header-mode" id="loadingMode">Quick</span>
                    </div>
                    <div class="loading-steps" id="loadingSteps"></div>
                    <div class="loading-bar-wrap">
                        <div class="loading-bar">
                            <div class="loading-bar-fill" id="loadingBarFill"></div>
                        </div>
                        <span class="loading-pct" id="loadingPct">0%</span>
                    </div>
                    <div class="loading-signal" id="loadingSignal"></div>
                </div>
            </section>

            <!-- RESULTS VIEW -->
            <section id="resultsView" class="view">
                <div class="results-toolbar">
                    <button class="btn btn-ghost" id="backBtn" type="button">&larr; New Idea</button>
                    <span class="results-meta" id="resultsMeta"></span>
                </div>
                <div id="resultsBody"></div>
            </section>

        </div>
    </div>

    <script src="/app.js" defer></script>
</body>
</html>
